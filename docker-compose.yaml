services:
  db:
    container_name: 1702db
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${PASSWORD}
      POSTGRES_USER: ${USR}
      POSTGRES_DB: ${DB}
    ports:
      - "3432:5432"
    volumes:
      - 1702data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USR}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  web:
    container_name: 1702app
    build: ./app
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock 
      - ./uploads:/uploads
    networks:
      - app-network

volumes:
  1702data:
  upload_data:

networks:
  app-network: