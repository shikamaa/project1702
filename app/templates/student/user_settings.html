<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <ul>
    {% for m in menu %}
        <li><a href="{{ url_for(m.url) }}"> {{ m.name }}</a></li>
    {% endfor %}
    </ul>

    {% with messages = get_flashed_messages() %}
        {% for msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}
    {% endwith %}

    <form class="auth-card" method="POST" action="{{ url_for('simple_routes.settings') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <h2>Username</h2>

        <label for="new_username">{{ usr }}, you can change your username</label>
        <input type="text" id="new_username" name="new_username" required>

        <button type="submit">Change username</button>
    </form>

    <form class="auth-card" method="POST" action="{{ url_for('simple_routes.settings') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <h2>Password</h2>

        <label for="password">Current password</label>
        <input type="password" id="password" name="password" required>

        <label for="new_password">New password</label>
        <input type="password" id="new_password" name="new_password" required>

        <button type="submit">Change password</button>
    </form>
</body>
</html>
