<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename = 'style.css') }} ">
</head>
<body>
    <ul>
        {% for m in menu %}
        <li><a href="{{ url_for(m.url) }}">{{ m.name }}</a></li>
        {% endfor %}
    </ul>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
                <div>{{ message }}</div>
        {% endif %}
    {% endwith %}

    <form method = "POST" action = "{{ url_for('simple_routes.settings')}}">
        <label for = "new_username">{{usr }}, You can change your username</label>
        <input type = "text" id = "new_username" name = "new_username">
        <button type="submit">Change username</button>
        
    </form>    
    <form method="POST" action="{{ url_for('simple_routes.settings') }}">
        <label for="password">Enter your current password</label>
        <input type="password" id="password" name="password" required>
        <br><br>

        <label for="new_password">Enter your new password</label>
        <input type="password" id="new_password" name="new_password" required>
        <br><br>

        <button type="submit">Submit</button>
    </form>
    
</body>
</html>
