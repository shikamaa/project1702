services:
  db:
    container_name: 1702db
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${PASSWORD}
      POSTGRES_USER: ${USR}
      POSTGRES_DB: ${DB}
    volumes:
      - 1702data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USR} -d ${DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: 1702redis
    volumes:
      - redis-data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    env_file:
      - .env
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-defaultpassword}
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    sysctls:
      - net.core.somaxconn=65535

  # Фильтрующий прокси перед Docker-сокетом: настоящий сокет смонтирован
  # только сюда (и read-only), воркер ходит к прокси по TCP внутри сети.
  # Всё, что не разрешено флагами ниже, прокси отвечает 403.
  docker-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: 1702dockerproxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1      # list/inspect/wait контейнеров
      - POST=1            # POST-запросы в принципе (create, kill, ...)
      - ALLOW_START=1     # containers.run = create + start
      - ALLOW_STOP=1      # kill/stop при превышении бюджета
      - DELETE=1          # container.remove(force=True) в finally
      - IMAGES=1          # docker-py проверяет наличие образа judge
    restart: unless-stopped
    networks:
      - app-network

  web:
    container_name: 1702app
    build: ./app
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - ./.env
    restart: unless-stopped
    volumes:
      - ./uploads:/uploads
      - ./logs:/app/logs
      - ./app/migrations:/app/migrations
    networks:
      - app-network

  worker:
    container_name: 1702worker
    build: ./app
    command: celery -A wsgi:celery_app worker --concurrency=4 --loglevel=info
    env_file: ./.env
    environment:
      - HOST_UPLOADS=${PWD}/uploads
      - DOCKER_HOST=tcp://docker-proxy:2375 
    volumes:
      - ./uploads:/uploads
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      docker-proxy:
        condition: service_started
    networks:
      - app-network

  migrate:
    container_name: 1702migrate
    build: ./app
    command: alembic upgrade head
    env_file:
      - ./.env
    volumes:
      - ./app/migrations:/app/migrations
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  judge:
    container_name: 1702judge
    build:
      context: ./judge
      dockerfile: judge.Dockerfile
    image: judge:latest
    profiles: ["build-only"]

volumes:
  1702data:
  redis-data:

networks:
  app-network:
    driver: bridge